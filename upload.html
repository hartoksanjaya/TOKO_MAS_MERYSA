<!DOCTYPE html>
<html>
<head>
    <title>Admin Toko Mas Merysa - Manage Products</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #222; padding: 20px; border-radius: 12px; border: 1px solid #D4AF37; margin-bottom: 20px; }
        h2, h3 { color: #D4AF37; text-transform: uppercase; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-right: 5px; }
        .btn-add { background: #D4AF37; color: black; width: 100%; margin-top: 10px; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; }
        .btn-edit { background: #3498db; color: white; padding: 5px 10px; font-size: 12px; }
        
        .product-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .product-item { background: #333; padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
        .product-item img { height: 50px; width: 50px; object-fit: cover; border-radius: 5px; border: 1px solid #D4AF37; }
        .product-info { flex-grow: 1; margin-left: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>General Settings</h2>
        <label>Harga Emas Hari Ini:</label>
        <input type="text" id="hargaEmas" placeholder="Contoh: Rp 2.650.000 / gram">
        <button class="btn btn-add" onclick="updateHarga()">Update Harga Emas</button>
    </div>

    <div class="card">
        <h3>Tambah / Edit Produk</h3>
        <input type="hidden" id="editKey">
        <label>Nama Produk:</label>
        <input type="text" id="namaProduk" placeholder="Nama Perhiasan">
        <label>Foto Produk:</label>
        <input type="file" id="fotoProduk" accept="image/*">
        <button id="btnSave" class="btn btn-add" onclick="saveProduct()">Simpan Produk</button>
        <button id="btnCancel" class="btn" style="display:none; background:#555; color:white; width:100%; margin-top:5px;" onclick="resetForm()">Batal Edit</button>
    </div>

    <div class="card">
        <h3>Daftar Produk Pajangan</h3>
        <div id="listProduk" class="product-list">
            </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCi-CNKPGkeUuc7WBCizkQlLO9DT2cXJAk",
        authDomain: "tokomasmerysa.firebaseapp.com",
        databaseURL: "https://tokomasmerysa-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tokomasmerysa",
        appId: "1:659517947527:web:4ed83fc9f6206b45ef0222"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Update Harga Emas
    function updateHarga() {
        const harga = document.getElementById('hargaEmas').value;
        if(!harga) return alert("Isi harga!");
        db.ref('toko_mas/config').update({ harga: harga });
        alert("Harga diperbarui!");
    }

    // 2. Simpan Produk (Tambah atau Update)
    async function saveProduct() {
        const key = document.getElementById('editKey').value;
        const nama = document.getElementById('namaProduk').value;
        const file = document.getElementById('fotoProduk').files[0];
        
        if(!nama) return alert("Isi nama produk!");

        let productData = { nama: nama };

        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async (e) => {
                productData.foto = e.target.result;
                processSave(key, productData);
            };
        } else if(key) {
            processSave(key, productData);
        } else {
            alert("Pilih foto untuk produk baru!");
        }
    }

    function processSave(key, data) {
        if(key) {
            db.ref('toko_mas/produk/' + key).update(data);
            alert("Produk berhasil diedit!");
        } else {
            db.ref('toko_mas/produk').push(data);
            alert("Produk berhasil ditambah!");
        }
        resetForm();
    }

    // 3. Ambil Data Real-time untuk List
    db.ref('toko_mas/produk').on('value', (snapshot) => {
        const listDiv = document.getElementById('listProduk');
        listDiv.innerHTML = "";
        snapshot.forEach((child) => {
            const item = child.val();
            listDiv.innerHTML += `
                <div class="product-item">
                    <img src="${item.foto}">
                    <div class="product-info">
                        <strong>${item.nama}</strong>
                    </div>
                    <div>
                        <button class="btn btn-edit" onclick="editMode('${child.key}', '${item.nama}')">Edit</button>
                        <button class="btn btn-delete" onclick="deleteProduct('${child.key}')">Hapus</button>
                    </div>
                </div>
            `;
        });
    });

    // 4. Hapus Produk
    function deleteProduct(key) {
        if(confirm("Hapus produk ini?")) {
            db.ref('toko_mas/produk/' + key).remove();
        }
    }

    // 5. Masuk ke mode Edit
    function editMode(key, nama) {
        document.getElementById('editKey').value = key;
        document.getElementById('namaProduk').value = nama;
        document.getElementById('btnSave').innerText = "Update Perubahan";
        document.getElementById('btnCancel').style.display = "block";
    }

    function resetForm() {
        document.getElementById('editKey').value = "";
        document.getElementById('namaProduk').value = "";
        document.getElementById('fotoProduk').value = "";
        document.getElementById('btnSave').innerText = "Simpan Produk";
        document.getElementById('btnCancel').style.display = "none";
    }
</script>
</body>
</html>
