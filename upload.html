<!DOCTYPE html>
<html>
<head>
    <title>Admin Toko Mas Merysa - Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: #222; padding: 20px; border-radius: 12px; border: 1px solid #D4AF37; margin-bottom: 20px; }
        h2, h3 { color: #D4AF37; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; color: #aaa; font-size: 14px; }
        input { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn { padding: 12px 20px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; transition: 0.3s; }
        .btn-gold { background: #D4AF37; color: black; width: 100%; }
        .btn-gold:hover { background: #f1c40f; }
        .btn-red { background: #e74c3c; color: white; padding: 5px 10px; }
        .btn-blue { background: #3498db; color: white; padding: 5px 10px; }
        
        .product-item { background: #333; padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .product-item img { height: 60px; width: 60px; object-fit: cover; border-radius: 5px; border: 1px solid #D4AF37; }
        .info { flex-grow: 1; margin-left: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Tampilan Website (Logo & BG)</h2>
        <label>Ganti Logo Toko:</label>
        <input type="file" id="upLogo" accept="image/*">
        
        <label>Ganti Background Website:</label>
        <input type="file" id="upBG" accept="image/*">
        
        <button class="btn btn-gold" onclick="updateTampilan()">Simpan Perubahan Tampilan</button>
    </div>

    <div class="card">
        <h2>Harga Emas</h2>
        <label>Harga Hari Ini:</label>
        <input type="text" id="hargaEmas" placeholder="Contoh: Rp 2.650.000 / gram">
        <button class="btn btn-gold" onclick="updateHarga()">Update Harga</button>
    </div>

    <div class="card">
        <h3>Kelola Produk</h3>
        <input type="hidden" id="editKey">
        <label>Nama Produk:</label>
        <input type="text" id="namaProduk" placeholder="Contoh: Cincin Berlian">
        <label>Foto Produk:</label>
        <input type="file" id="fotoProduk" accept="image/*">
        <button id="btnSave" class="btn btn-gold" onclick="saveProduct()">Simpan Produk</button>
        <button id="btnCancel" class="btn" style="display:none; background:#555; color:white; width:100%;" onclick="resetForm()">Batal</button>
    </div>

    <div class="card">
        <h3>Daftar Produk di Website</h3>
        <div id="listProduk"></div>
    </div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ANDA ---
    const firebaseConfig = {
        apiKey: "AIzaSyCi-CNKPGkeUuc7WBCizkQlLO9DT2cXJAk",
        authDomain: "tokomasmerysa.firebaseapp.com",
        databaseURL: "https://tokomasmerysa-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tokomasmerysa",
        appId: "1:659517947527:web:4ed83fc9f6206b45ef0222"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    // 1. UPDATE LOGO & BACKGROUND
    async function updateTampilan() {
        const logoFile = document.getElementById('upLogo').files[0];
        const bgFile = document.getElementById('upBG').files[0];
        let updates = {};

        if(logoFile) updates['logo'] = await toBase64(logoFile);
        if(bgFile) updates['bg'] = await toBase64(bgFile);

        if(Object.keys(updates).length > 0) {
            db.ref('toko_mas/config').update(updates);
            alert("Tampilan Berhasil Diperbarui!");
        } else {
            alert("Pilih file terlebih dahulu!");
        }
    }

    // 2. UPDATE HARGA
    function updateHarga() {
        const harga = document.getElementById('hargaEmas').value;
        if(harga) {
            db.ref('toko_mas/config').update({ harga: harga });
            alert("Harga Berhasil Diperbarui!");
        }
    }

    // 3. KELOLA PRODUK (CRUD)
    async function saveProduct() {
        const key = document.getElementById('editKey').value;
        const nama = document.getElementById('namaProduk').value;
        const file = document.getElementById('fotoProduk').files[0];
        
        let data = { nama: nama };

        if(file) {
            data.foto = await toBase64(file);
        }

        if(key) { // Mode Edit
            db.ref('toko_mas/produk/' + key).update(data);
            alert("Produk Diperbarui!");
        } else { // Mode Tambah
            if(!file) return alert("Pilih foto untuk produk baru!");
            db.ref('toko_mas/produk').push(data);
            alert("Produk Ditambahkan!");
        }
        resetForm();
    }

    db.ref('toko_mas/produk').on('value', (snapshot) => {
        const listDiv = document.getElementById('listProduk');
        listDiv.innerHTML = "";
        snapshot.forEach((child) => {
            const item = child.val();
            listDiv.innerHTML += `
                <div class="product-item">
                    <img src="${item.foto}">
                    <div class="info"><strong>${item.nama}</strong></div>
                    <div>
                        <button class="btn btn-blue" onclick="editMode('${child.key}', '${item.nama}')">Edit</button>
                        <button class="btn btn-red" onclick="deleteProduct('${child.key}')">Hapus</button>
                    </div>
                </div>`;
        });
    });

    function deleteProduct(key) {
        if(confirm("Hapus produk ini?")) db.ref('toko_mas/produk/' + key).remove();
    }

    function editMode(key, nama) {
        document.getElementById('editKey').value = key;
        document.getElementById('namaProduk').value = nama;
        document.getElementById('btnSave').innerText = "Update Produk";
        document.getElementById('btnCancel').style.display = "block";
    }

    function resetForm() {
        document.getElementById('editKey').value = "";
        document.getElementById('namaProduk').value = "";
        document.getElementById('fotoProduk').value = "";
        document.getElementById('btnSave').innerText = "Simpan Produk";
        document.getElementById('btnCancel').style.display = "none";
    }
</script>
</body>
</html>
