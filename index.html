<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selamat Datang di Toko Mas Merysa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <!-- 📱 PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Background gradient mewah */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(180, 140, 80, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(139, 115, 85, 0.08) 0%, transparent 70%),
        linear-gradient(135deg, #0a0a0a 0%, #1a120b 50%, #0f0f0f 100%);
      z-index: -3;
    }

    /* Partikel emas mengambang */
    .gold-particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -2;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px; height: 4px;      background: radial-gradient(circle, #ffd700, #b8860b);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
      opacity: 0.6;
      box-shadow: 0 0 10px #ffd700, 0 0 20px #daa520;
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    /* Efek emas meleleh / lava */
    .lava-container {
      position: fixed;
      bottom: -150px;
      left: 0;
      width: 100%;
      height: 300px;
      z-index: -1;
      overflow: hidden;
    }

    .lava {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at bottom, rgba(255, 215, 0, 0.4) 0%, transparent 70%),
        linear-gradient(to top, 
          rgba(218, 165, 32, 0.6) 0%, 
          rgba(184, 134, 11, 0.3) 30%, 
          transparent 100%);
      animation: lavaFlow 8s ease-in-out infinite alternate;
      filter: blur(2px);
    }

    .lava::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 10%;
      right: 10%;
      height: 60%;
      background: 
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.3) 0%, transparent 70%),        linear-gradient(90deg, 
          transparent, 
          rgba(255, 223, 100, 0.4) 20%, 
          rgba(255, 180, 50, 0.3) 50%, 
          rgba(255, 223, 100, 0.4) 80%, 
          transparent);
      animation: lavaShine 4s ease-in-out infinite;
      border-radius: 50% 50% 0 0;
    }

    @keyframes lavaFlow {
      0% { 
        transform: scaleX(1) translateY(0); 
        opacity: 0.7;
      }
      100% { 
        transform: scaleX(1.05) translateY(-10px); 
        opacity: 1;
      }
    }

    @keyframes lavaShine {
      0%, 100% { opacity: 0.4; transform: translateX(-5%); }
      50% { opacity: 0.8; transform: translateX(5%); }
    }

    /* Glow emas di sekitar */
    .glow-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(10, 10, 10, 0.95) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Container utama */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
    }

    /* Logo / Judul mewah */    .welcome-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      background: linear-gradient(45deg, 
        #fff 0%, 
        #ffd700 25%, 
        #f5e6a4 40%, 
        #daa520 55%, 
        #b8860b 70%, 
        #ffd700 85%, 
        #fff 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShimmer 4s ease-in-out infinite;
      text-shadow: 0 4px 30px rgba(218, 165, 32, 0.5);
      margin-bottom: 1.5rem;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    @keyframes goldShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 3rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInUp 1s ease-out 0.3s forwards;
    }

    /* Tombol premium */
    .enter-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 3.5rem;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 600;      text-decoration: none;
      color: #1a120b;
      background: linear-gradient(135deg, #ffd700, #daa520, #b8860b, #daa520, #ffd700);
      background-size: 300% 300%;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        0 8px 35px rgba(218, 165, 32, 0.6),
        0 0 0 2px rgba(255, 255, 255, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -2px 0 rgba(139, 115, 85, 0.3);
      animation: btnShimmer 3s ease-in-out infinite;
      opacity: 0;
      animation: fadeInUp 1s ease-out 0.6s forwards, btnShimmer 3s ease-in-out infinite;
    }

    .enter-btn:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 
        0 15px 50px rgba(218, 165, 32, 0.8),
        0 0 0 2px rgba(255, 255, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.6),
        inset 0 -2px 0 rgba(139, 115, 85, 0.4);
      background-position: 100% 50%;
    }

    .enter-btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .enter-btn::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(45deg, #ffd700, #fff, #ffd700, #daa520);
      background-size: 400% 400%;
      border-radius: 52px;
      z-index: -1;
      animation: borderGlow 3s linear infinite;
      opacity: 0.7;
      filter: blur(8px);
    }

    .enter-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 50%);      border-radius: 50px;
      pointer-events: none;
    }

    @keyframes btnShimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 400% 50%; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Dekorasi emas di sudut */
    .corner-decoration {
      position: fixed;
      width: 150px; height: 150px;
      z-index: 5;
      opacity: 0.6;
    }

    .corner-decoration.top-left {
      top: 20px; left: 20px;
      border-top: 2px solid #daa520;
      border-left: 2px solid #daa520;
      border-radius: 20px 0 0 0;
    }

    .corner-decoration.bottom-right {
      bottom: 20px; right: 20px;
      border-bottom: 2px solid #daa520;
      border-right: 2px solid #daa520;
      border-radius: 0 0 20px 0;
    }

    .corner-decoration::before {
      content: '✦';      position: absolute;
      font-size: 2rem;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }

    .corner-decoration.top-left::before { top: -10px; left: -10px; }
    .corner-decoration.bottom-right::before { bottom: -10px; right: -10px; }

    /* Footer halus */
    .footer-note {
      position: fixed;
      bottom: 250px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 2s ease-out 1.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Responsif */
    @media (max-width: 768px) {
      .welcome-title {
        font-size: 2.8rem;
        letter-spacing: 1px;
      }
      .subtitle {
        font-size: 1rem;
        letter-spacing: 2px;
      }
      .enter-btn {
        padding: 1rem 2.5rem;
        font-size: 1.1rem;
      }
      .lava-container {
        height: 200px;
        bottom: -100px;
      }
    }

    /* Animasi masuk halaman */
    @keyframes pageLoad {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    .container {
      animation: pageLoad 1s ease-out forwards;
    }
  </style>
</head>
<body>
  <!-- Partikel emas -->
  <div class="gold-particles" id="particles"></div>

  <!-- Efek lava/emas meleleh -->
  <div class="lava-container">
    <div class="lava"></div>
  </div>

  <!-- Glow overlay -->
  <div class="glow-overlay"></div>

  <!-- Dekorasi sudut -->
  <div class="corner-decoration top-left"></div>
  <div class="corner-decoration bottom-right"></div>

  <!-- Konten utama -->
  <div class="container">
    <h1 class="welcome-title">Selamat Datang di<br>Toko Mas Merysa</h1>
    <p class="subtitle">Keanggunan Emas • Kemewahan Abadi • Kepercayaan Sejati</p>
    
    <a href="https://hartok.my.id/MERYSA/" class="enter-btn" target="_blank" rel="noopener noreferrer">
      ✦ Klik Disini Untuk Masuk ✦
    </a>
  </div>

  <!-- Footer note -->
  <div class="footer-note">✨ Koleksi Emas Premium untuk Wanita Modern ✨</div>

  <script>
    // Generate partikel emas mengambang
    document.addEventListener('DOMContentLoaded', function() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 40;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        // Posisi acak
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (12 + Math.random() * 10) + 's';
        particle.style.width = particle.style.height = (2 + Math.random() * 5) + 'px';        
        particlesContainer.appendChild(particle);
      }

      // Efek hover halus pada tombol
      const btn = document.querySelector('.enter-btn');
      btn.addEventListener('mouseenter', function() {
        this.style.transition = 'all 0.3s ease';
      });
    });
// =====================================
// REGISTER SERVICE WORKER
// ==========================================
if ('servic-eWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('/sw.js', {
        scope: '/'
      });
      console.log('[PWA] Service Worker registered:', registration.scope);

      // Auto update setiap 1 jam
      setInterval(() => {
        registration.update();
      }, 60 * 60 * 1000);

      // Detect update
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateNotification();
          }
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('[PWA] New service worker activated');
        window.location.reload();
      });

    } catch (error) {
      console.error('[PWA] Service Worker registration failed:', error);
    }
  });
}

// ==========================================
// CAPTURE INSTALL PROMPT
// ==========================================
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  console.log('[PWA] Install prompt captured');

  setTimeout(() => {
    showInstallButton();
  }, 3000);
});

// ==========================================
// TOMBOL INSTALL
// ==========================================
function showInstallButton() {
  const existingBtn = document.getElementById('installBtn');
  if (existingBtn) return;

  const installBtn = document.createElement('button');
  installBtn.id = 'installBtn';
  installBtn.innerHTML = '📲 Install App';

  installBtn.style.cssText = `
    position: fixed; bottom: 80px; left: 20px; z-index: 1500;
    background: linear-gradient(135deg, #D4AF37, #AA8C2C);
    color: #0A0A0A; border: none; padding: 12px 20px; border-radius: 25px;
    font-weight: 600; font-size: 0.85rem; cursor: pointer;
    box-shadow: 0 5px 20px rgba(212,175,55,0.4);
    display: flex; align-items: center; gap: 8px;
    font-family: 'Poppins', sans-serif;
  `;

  installBtn.onclick = () => {
    showInstallOptions();
  };

  document.body.appendChild(installBtn);

  // Auto hide
  setTimeout(() => {
    installBtn.style.opacity = '0';
    installBtn.style.transform = 'translateY(100px)';
    installBtn.style.transition = 'all 0.5s ease';
    setTimeout(() => installBtn.remove(), 500);
  }, 30000);
}

// ==========================================
// MODAL PILIHAN INSTALL
// ==========================================
function showInstallOptions() {
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
  `;

  modal.innerHTML = `
    <div style="
      background:#111;
      padding:20px;
      border-radius:15px;
      text-align:center;
      width:90%;
      max-width:300px;
      font-family:'Poppins',sans-serif;
      color:#fff;
    ">
      <h3 style="margin-bottom:15px;">Pilih Instalasi</h3>

      <button id="pwaInstall" style="
        width:100%; margin-bottom:10px;
        padding:12px; border:none;
        border-radius:10px;
        background:#D4AF37; color:#000;
        font-weight:bold;
        cursor:pointer;
      ">
        📲 Install Langsung
      </button>

      <button id="playstoreInstall" style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#0f9d58;
        color:#fff;
        font-weight:bold;
        cursor:pointer;
      ">
        ▶️ Play Store
      </button>

      <button id="closeModal" style="
        margin-top:10px;
        background:none;
        border:none;
        color:#aaa;
        cursor:pointer;
      ">Tutup</button>
    </div>
  `;

  document.body.appendChild(modal);

  // INSTALL PWA
  document.getElementById('pwaInstall').onclick = async () => {
    if (!deferredPrompt) {
      showToast('Browser tidak mendukung install langsung');
      return;
    }

    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;

    if (outcome === 'accepted') {
      console.log('[PWA] User accepted install');
      showToast('Aplikasi berhasil di-install! 🎉');
    }

    deferredPrompt = null;
    modal.remove();
  };

  // PLAY STORE (GANTI LINK INI)
  document.getElementById('playstoreInstall').onclick = () => {
    window.open('https://play.google.com/store/apps/details?id=io.github.hartoksanjaya.twa', '_blank');
  };

  // CLOSE
  document.getElementById('closeModal').onclick = () => {
    modal.remove();
  };
}

// ==========================================
// STATUS INSTALLED
// ==========================================
window.addEventListener('appinstalled', () => {
  isPWAInstalled = true;
  console.log('[PWA] App installed');
  showToast('Terima kasih telah meng-install MERYSA! 💛');

  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.remove();
});

// ==========================================
// UPDATE NOTIFICATION
// ==========================================
function showUpdateNotification() {
  if (confirm('Versi baru tersedia! Refresh untuk update?')) {
    navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
  }
}

// ==========================================
// ONLINE / OFFLINE STATUS
// ==========================================
window.addEventListener('online', () => {
  showToast('Koneksi internet kembali! 🌐');
});

window.addEventListener('offline', () => {
  showToast('Mode offline - Data tersimpan di perangkat 📴');
});

// ==========================================
// PRECACHE
// ==========================================
if ('serviceWorker' in navigator && navigator.onLine) {
  navigator.serviceWorker.ready.then((registration) => {
    registration.active.postMessage({
      type: 'CACHE_URLS',
      urls: [
        '/#products',
        '/#hero'
      ]
    });
  });
}

console.log('[PWA] Toko Mas Merysa PWA Ready');
  </script>
</body>
</html>
