<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Mas Merysa | Exclusive Gallery</title>
    <meta name="description" content="Koleksi video eksklusif & harga emas terbaru dari Toko Mas Merysa">
    
    <!-- 🎨 Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F4E4A6;
            --gold-dark: #AA8C2C;
            --gold-grad: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.85);
            --glass: rgba(255,255,255,0.06);
            --border: rgba(212,175,55,0.3);
            --text: #ffffff;
            --muted: #b0b0b0;
            --nav-h: 80px;
            --trans: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            line-height: 1.6;
            background-attachment: fixed;
            background-image: url('images/bg.jpg');
            background-size: cover;
            background-position: center;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse at center, rgba(10,10,10,0.7), rgba(5,5,5,0.95));
            z-index:-1;
        }

        /* ✨ Loader */
        #loader {
            position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
            justify-content:center; align-items:center; z-index:9999; transition:opacity 0.5s;
        }
        #loader.hidden { opacity:0; pointer-events:none; }
        .spin {
            width:70px; height:70px; border:3px solid transparent; border-top-color:var(--gold);
            border-radius:50%; animation:spin 1s linear infinite, glow 2s infinite alternate;
        }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        @keyframes glow { from { box-shadow:0 0 15px rgba(212,175,55,0.4); } to { box-shadow:0 0 30px rgba(212,175,55,0.8); } }
        .loader-txt { margin-top:25px; font-family:'Playfair Display'; color:var(--gold); letter-spacing:6px; }

        /* 🧭 Navbar */
        nav {
            position:fixed; top:0; width:100%; height:var(--nav-h); display:flex; justify-content:space-between; align-items:center;
            padding:0 5%; background:rgba(5,5,5,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); z-index:1000;
            transition:var(--trans);
        }
        nav.scrolled { height:65px; background:rgba(5,5,5,0.98); box-shadow:0 5px 30px rgba(0,0,0,0.5); }
        .logo { width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); overflow:hidden; cursor:pointer; }
        .logo img { width:100%; height:100%; object-fit:cover; }
        .nav-links { display:flex; gap:35px; list-style:none; }
        .nav-links a { color:var(--text); text-decoration:none; font-size:13px; letter-spacing:2.5px; text-transform:uppercase; transition:var(--trans); }
        .nav-links a:hover { color:var(--gold); transform:translateY(-2px); }
        .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:10px; }
        .hamburger span { width:26px; height:3px; background:var(--gold); border-radius:2px; transition:var(--trans); }
        .hamburger.active span:nth-child(1) { transform:rotate(45deg) translate(6px,6px); }
        .hamburger.active span:nth-child(2) { opacity:0; }
        .hamburger.active span:nth-child(3) { transform:rotate(-45deg) translate(6px,-6px); }

        /* 🏛️ Hero */
        .hero { min-height:90vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:calc(var(--nav-h)+40px) 5% 60px; position:relative; }
        .hero h1 { font-size:clamp(2.5rem, 9vw, 5rem); letter-spacing:6px; text-transform:uppercase; background:var(--gold-grad); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:1.5rem; font-weight:700; }
        .hero p { font-style:italic; color:var(--muted); letter-spacing:4px; margin-bottom:2.5rem; font-family:'Playfair Display'; font-size:1.2rem; }
        .price-box {
            background:var(--glass); backdrop-filter:blur(15px); padding:15px 35px; border:1px solid var(--gold); border-radius:50px;
            display:inline-flex; align-items:center; gap:12px; box-shadow:0 10px 30px rgba(212,175,55,0.2);
        }
        .price-box span { color:var(--gold); font-weight:600; font-size:1.1rem; }
        .price-box i { animation:bounce 2s infinite; }
        @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }

        /* 📱 Social Links */
        .social-bar { padding:2rem 5%; display:flex; justify-content:center; gap:25px; flex-wrap:wrap; }
        .soc-btn {
            width:60px; height:60px; border-radius:50%; background:var(--glass); border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:var(--gold); transition:var(--trans); text-decoration:none;
        }
        .soc-btn:hover { background:var(--gold); color:#050505; transform:translateY(-5px) scale(1.1); box-shadow:0 10px 25px rgba(212,175,55,0.4); }

        /* 🎬 Video Gallery */
        .gallery { padding:2rem 5% 5rem; }
        .section-title { text-align:center; margin-bottom:3rem; }
        .section-title h2 { font-size:2.2rem; letter-spacing:4px; text-transform:uppercase; background:var(--gold-grad); -webkit-background-clip:text; background-clip:text; color:transparent; display:inline-block; }
        .section-title h2::after { content:''; display:block; width:80px; height:3px; background:var(--gold); margin:12px auto 0; border-radius:2px; }
        .video-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:25px; }
        .vid-card {
            background:var(--card); border:1px solid var(--border); border-radius:20px; overflow:hidden; transition:var(--trans); position:relative;
        }
        .vid-card:hover { transform:translateY(-8px); box-shadow:0 15px 40px rgba(0,0,0,0.6); border-color:var(--gold); }
        .embed-wrap { position:relative; width:100%; aspect-ratio:16/9; background:#000; }
        .embed-wrap iframe, .embed-wrap video { width:100%; height:100%; border:none; }
        .vid-info { padding:18px; }
        .vid-info h3 { font-size:1.1rem; margin-bottom:6px; font-weight:500; }
        .vid-info p { color:var(--muted); font-size:0.85rem; margin-bottom:15px; }
        .vid-actions { display:flex; gap:10px; }
        .btn-sm { padding:8px 16px; border-radius:25px; font-size:0.75rem; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:var(--trans); text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-gold { background:var(--gold); color:#000; border:none; }
        .btn-ghost { background:transparent; border:1px solid var(--gold); color:var(--gold); }
        .btn-sm:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(212,175,55,0.3); }
        .admin-controls { display:none; position:absolute; top:10px; right:10px; z-index:10; gap:8px; }
        .admin-mode .admin-controls { display:flex; }

        /* 🎵 Music Player */
        .music-pill {
            position:fixed; bottom:25px; right:25px; background:var(--card); backdrop-filter:blur(15px);
            border:1px solid var(--gold); padding:12px 22px; border-radius:50px; display:flex; align-items:center; gap:15px;
            cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,0.5); transition:var(--trans); z-index:999;
        }
        .music-pill:hover { transform:translateY(-4px); box-shadow:0 15px 40px rgba(212,175,55,0.3); }
        .visualizer { display:flex; align-items:flex-end; height:18px; gap:4px; }
        .bar { width:4px; background:var(--gold); border-radius:2px; height:6px; }
        .playing .bar { animation:vis 0.8s infinite alternate; }
        .bar:nth-child(2) { animation-delay:0.1s; } .bar:nth-child(3) { animation-delay:0.2s; } .bar:nth-child(4) { animation-delay:0.3s; }
        @keyframes vis { to { height:18px; } }
        .music-text { color:var(--gold); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }

        /* 🔐 Admin Modal */
        .modal {
            position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none; transition:0.3s; z-index:2000; padding:20px;
        }
        .modal.active { opacity:1; pointer-events:auto; }
        .modal-box { background:var(--card); border:1px solid var(--gold); border-radius:20px; padding:30px; width:100%; max-width:350px; text-align:center; }
        .modal-box h3 { color:var(--gold); margin-bottom:15px; }
        .input-field {
            width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:#fff;
            border-radius:8px; margin-bottom:15px; outline:none; transition:0.3s;
        }
        .input-field:focus { border-color:var(--gold); }

        /* 🦶 Footer */
        footer { text-align:center; padding:3rem 2rem; border-top:1px solid var(--border); font-size:0.8rem; color:var(--muted); letter-spacing:1px; }
        footer a { color:var(--gold); text-decoration:none; }

        /* 📱 Responsive */
        @media(max-width:768px) {
            .hamburger { display:flex; }
            .nav-links {
                position:fixed; top:var(--nav-h); left:0; width:100%; height:calc(100vh - var(--nav-h));
                flex-direction:column; justify-content:center; align-items:center; gap:30px; background:rgba(5,5,5,0.98);
                transform:translateY(-100%); opacity:0; pointer-events:none; transition:0.5s;
            }
            .nav-links.active { transform:translateY(0); opacity:1; pointer-events:auto; }
            .embed-wrap { aspect-ratio:9/16; max-height:450px; }
        }
    </style>
</head>
<body>

    <!-- 💎 Loader -->
    <div id="loader"><div class="spin"></div><div class="loader-txt">MERYSA</div></div>

    <!-- 🧭 Navbar -->
    <nav id="navbar">
        <div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <img src="images/logo.png" id="logoImg" alt="Logo">
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Beranda</a></li>
            <li><a href="#gallery">Video</a></li>
            <li><a href="#social">Sosial</a></li>
            <li><a href="#" id="adminToggle"><i class="fas fa-lock"></i> Admin</a></li>
        </ul>
        <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </nav>

    <!-- 🏛️ Hero -->
    <section class="hero">
        <h1>Toko Mas Merysa</h1>
        <p>Kemurnian Abadi, Keindahan Hakiki</p>
        <div class="price-box">
            <i class="fas fa-coins"></i>
            <span>Harga Emas:</span>
            <span id="goldPrice">Memuat...</span>
        </div>
    </section>

    <!-- 📱 Social Links -->
    <section id="social" class="social-bar">
        <a href="https://youtube.com" target="_blank" class="soc-btn" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="https://facebook.com" target="_blank" class="soc-btn" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://tiktok.com" target="_blank" class="soc-btn" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
        <a href="https://instagram.com" target="_blank" class="soc-btn" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    </section>

    <!-- 🎬 Video Gallery -->
    <section class="gallery" id="gallery">
        <div class="section-title"><h2>Koleksi Video</h2></div>
        <div class="video-grid" id="videoGrid">
            <!-- Videos injected here -->
        </div>
    </section>

    <!-- 🎵 Music Player -->
    <div class="music-pill" id="musicBtn">
        <div class="visualizer"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <span class="music-text" id="musicStatus">Play</span>
        <audio id="bgAudio" loop preload="none"><source src="audio/musik_latar.mp3" type="audio/mpeg"></audio>
    </div>

    <!-- 🔐 Admin Modal -->
    <div class="modal" id="adminModal">
        <div class="modal-box">
            <h3><i class="fas fa-shield-alt"></i> Mode Admin</h3>
            <input type="password" id="adminPass" class="input-field" placeholder="Masukkan PIN">
            <button class="btn-sm btn-gold" onclick="verifyAdmin()">Masuk</button>
            <p style="margin-top:10px;font-size:0.75rem;color:var(--muted);">Default: <code>merysa2024</code></p>
        </div>
    </div>

    <!-- 🦶 Footer -->
    <footer>
        &copy; <span id="year"></span> <a href="#">TOKO MAS MERYSA</a>. PEKANBARU, ID.<br>
        <span style="display:block;margin-top:8px;">Crafted with <span style="color:var(--gold);">♥</span> & Gold</span>
    </footer>

    <!-- 🔥 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // ⚙️ GANTI DENGAN CONFIG FIREBASE ANDA
        const firebaseConfig = {
        apiKey: "AIzaSyCi-CNKPGkeUuc7WBCizkQlLO9DT2cXJAk",
        authDomain: "tokomasmerysa.firebaseapp.com",
        databaseURL: "https://tokomasmerysa-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tokomasmerysa",
        appId: "1:659517947527:web:4ed83fc9f6206b45ef0222"
        };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 💡 Loader
        window.addEventListener('load', ()=>setTimeout(()=>document.getElementById('loader').classList.add('hidden'), 1200));

        // 🧭 Scroll & Menu
        window.addEventListener('scroll', ()=>document.getElementById('navbar').classList.toggle('scrolled', window.scrollY>50));
        const ham = document.getElementById('hamburger');
        const nav = document.getElementById('navLinks');
        ham.onclick = ()=>{ ham.classList.toggle('active'); nav.classList.toggle('active'); };
        document.querySelectorAll('.nav-links a').forEach(l=>l.onclick=()=>{ ham.classList.remove('active'); nav.classList.remove('active'); });

        // 🎵 Music
        const audio = document.getElementById('bgAudio'), musicBtn = document.getElementById('musicBtn'), musicStat = document.getElementById('musicStatus');
        let playing = false;
        musicBtn.onclick = ()=>{
            playing ? audio.pause() : audio.play().catch(()=>{});
            playing = !playing;
            musicBtn.classList.toggle('playing', playing);
            musicStat.textContent = playing ? 'Playing' : 'Play';
        };

        // 🔐 Admin Mode
        const adminPass = 'merysa2024'; // Ganti sesuai keinginan
        let isAdmin = localStorage.getItem('merysa_admin') === 'true';
        document.getElementById('adminToggle').onclick = (e)=>{
            e.preventDefault();
            if(isAdmin){ logoutAdmin(); return; }
            document.getElementById('adminModal').classList.add('active');
        };
        function verifyAdmin(){
            if(document.getElementById('adminPass').value === adminPass){
                isAdmin = true; localStorage.setItem('merysa_admin','true');
                document.getElementById('adminModal').classList.remove('active');
                document.body.classList.add('admin-mode');
                loadVideos(); // Reload to show controls
            } else alert('PIN salah!');
        }
        function logoutAdmin(){
            isAdmin = false; localStorage.removeItem('merysa_admin');
            document.body.classList.remove('admin-mode');
            loadVideos();
        }

        // 🎬 Embed Renderer
        function getEmbedUrl(platform, raw){
            if(platform==='youtube'){
                const id = raw.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/)?.[1];
                return id ? `https://www.youtube.com/embed/${id}` : raw;
            }
            if(platform==='facebook'){
                return `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(raw)}&show_text=false&width=500`;
            }
            if(platform==='tiktok'){
                const id = raw.match(/video\/(\d+)/)?.[1];
                return id ? `https://www.tiktok.com/embed/v2/${id}` : raw;
            }
            return raw;
        }

        // 📦 Load Data
        function loadVideos(){
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--muted);">Memuat koleksi...</p>';
            
            db.ref('posts').on('value', snap=>{
                grid.innerHTML = '';
                if(!snap.exists()){ grid.innerHTML='<p style="grid-column:1/-1;text-align:center;color:var(--muted);">Belum ada postingan.</p>'; return; }
                
                snap.forEach(child=>{
                    const d = child.val();
                    const embed = getEmbedUrl(d.platform, d.url);
                    const card = document.createElement('div');
                    card.className = 'vid-card';
                    card.innerHTML = `
                        <div class="admin-controls">
                            <button class="btn-sm btn-gold" onclick="window.location.href='upload.html?edit=${child.key}'"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-sm btn-ghost" style="color:#e74c3c;border-color:#e74c3c" onclick="deletePost('${child.key}')"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="embed-wrap"><iframe src="${embed}" loading="lazy" allowfullscreen></iframe></div>
                        <div class="vid-info">
                            <h3>${d.title}</h3>
                            <p>${d.desc || ''}</p>
                            <div class="vid-actions">
                                <span class="btn-sm btn-ghost"><i class="fab fa-${d.platform}"></i> ${d.platform.toUpperCase()}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                if(isAdmin) document.body.classList.add('admin-mode');
            });
        }

        // 💰 Load Config
        db.ref('config').on('value', snap=>{
            const c = snap.val()||{};
            document.getElementById('goldPrice').textContent = c.goldPrice || 'Rp 1.250.000/gram';
            if(c.logo) document.getElementById('logoImg').src = c.logo;
        });

        // 🗑️ Delete
        function deletePost(id){
            if(confirm('Hapus postingan ini?')) db.ref('posts/'+id).remove();
        }

        // 📅 Init
        document.getElementById('year').textContent = new Date().getFullYear();
        loadVideos();
        if(isAdmin) document.body.classList.add('admin-mode');
    </script>
</bod
