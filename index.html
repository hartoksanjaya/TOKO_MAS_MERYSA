<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merysa Gold Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- 📱 PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
/* 🎨 PREMIUM CSS VARIABLES */
:root {
  --gold-primary: #D4AF37;
  --gold-light: #F4E4A6;
  --gold-dark: #A67C00;
  --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
  --gold-glow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 40px rgba(212, 175, 55, 0.3);
  --dark-bg: #0a0a0f;
  --dark-card: rgba(20, 20, 30, 0.85);
  --dark-card-hover: rgba(30, 30, 45, 0.95);
  --border-gold: rgba(212, 175, 55, 0.4);
  --border-glow: rgba(212, 175, 55, 0.8);
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.85);
  --text-muted: rgba(255, 255, 255, 0.6);
  --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
  --shadow-gold: 0 10px 40px rgba(212, 175, 55, 0.25);
  --transition-fast: 0.2s ease;
  --transition-normal: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-full: 9999px;
}

/* 🌟 RESET & BASE */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  scroll-padding-top: 80px;
}

body {
  margin: 0;
  font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--dark-bg);
  color: var(--text-primary);
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ✨ PREMIUM TYPOGRAPHY */
h1, h2, h3, h4 {
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.5em;
}

h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
h2 { font-size: clamp(1.5rem, 4vw, 2.25rem); }
h3 { font-size: clamp(1.25rem, 3vw, 1.75rem); }

/* 🏆 GOLD TEXT EFFECT - PREMIUM */
.gold {
  background: var(--gold-gradient);
  background-size: 400% 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldShine 8s ease-in-out infinite;
  text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
  position: relative;
  display: inline-block;
}

.gold::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 80%;
  height: 2px;
  background: var(--gold-gradient);
  border-radius: 2px;
  transition: transform var(--transition-normal);
  opacity: 0.7;
}

.gold:hover::after {
  transform: translateX(-50%) scaleX(1);
}

@keyframes goldShine {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* 🌌 PREMIUM STAR BACKGROUND */
.stars {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.6), transparent),
    radial-gradient(1.5px 1.5px at 90px 40px, rgba(212,175,55,0.9), transparent),
    radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.7), transparent);
  background-size: 200px 200px;
  animation: starMove 100s linear infinite;
  opacity: 0.4;
  z-index: -2;
  pointer-events: none;
}

.stars::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 0%, var(--dark-bg) 70%);
}

@keyframes starMove {
  from { background-position: 0 0, 0 0, 0 0, 0 0; }
  to { background-position: 200px 200px, 150px 100px, 100px 150px, 180px 80px; }
}

/* 🌊 PREMIUM WAVE EFFECT */
.wave {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 200%;
  height: 150px;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(212, 175, 55, 0.15), 
    rgba(212, 175, 55, 0.08), 
    transparent);
  animation: waveFlow 12s ease-in-out infinite;
  z-index: -1;
  opacity: 0.6;
  filter: blur(1px);
}

.wave::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 0;
  width: 100%;
  height: 200%;
  background: url("image/svg+xml,%3Csvg viewBox='0 0 1200 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0v46.3c233.3 0 466.7-30.8 700-30.8s466.7 30.8 700 30.8V0H0z' fill='rgba(212,175,55,0.1)'/%3E%3C/svg%3E") repeat-x;
  background-size: 1200px 120px;
  animation: wavePattern 8s linear infinite;
}

@keyframes waveFlow {
  0%, 100% { transform: translateX(0) scaleY(1); }
  50% { transform: translateX(-25%) scaleY(1.05); }
}

@keyframes wavePattern {
  from { background-position: 0 0; }
  to { background-position: -1200px 0; }
}

/* 🎯 PREMIUM NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px clamp(16px, 4vw, 32px);
  background: rgba(10, 10, 15, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-gold);
  position: sticky;
  top: 0;
  z-index: 1000;
  transition: var(--transition-normal);
}

.navbar.scrolled {
  padding: 8px clamp(16px, 4vw, 32px);
  background: rgba(10, 10, 15, 0.98);
  box-shadow: var(--shadow-md);
}

/* 🖼️ PREMIUM LOGO */
.nav-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--gold-primary);
  box-shadow: var(--gold-glow);
  transition: var(--transition-normal);
  position: relative;
  overflow: hidden;
}

.logo-circle::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  padding: 2px;
  background: var(--gold-gradient);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: borderRotate 4s linear infinite;
}

@keyframes borderRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.logo-circle:hover {
  transform: scale(1.08) rotate(5deg);
  box-shadow: 0 0 30px rgba(212, 175, 55, 0.7), 0 0 60px rgba(212, 175, 55, 0.4);
}

.brand {
  font-size: 1.3rem;
  letter-spacing: 1.5px;
  font-weight: 700;
  text-transform: uppercase;
}

/* 🧭 PREMIUM MENU */
.menu {
  display: flex;
  gap: 8px;
  align-items: center;
}

.menu a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.95rem;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  position: relative;
  transition: var(--transition-normal);
  letter-spacing: 0.3px;
}

.menu a::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-sm);
  background: var(--gold-gradient);
  opacity: 0;
  transition: var(--transition-normal);
  z-index: -1;
}

.menu a:hover,
.menu a.active {
  color: var(--dark-bg);
  transform: translateY(-2px);
}

.menu a:hover::before,
.menu a.active::before {
  opacity: 1;
}

.menu a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 70%;
  height: 2px;
  background: var(--gold-primary);
  border-radius: 2px;
  transition: transform var(--transition-normal);
  box-shadow: 0 0 10px var(--gold-primary);
}

.menu a:hover::after {
  transform: translateX(-50%) scaleX(1);
}

/* 🍔 PREMIUM HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
  border-radius: var(--radius-sm);
  transition: var(--transition-fast);
  z-index: 1001;
}

.hamburger:hover {
  background: rgba(212, 175, 55, 0.15);
}

.hamburger span {
  width: 24px;
  height: 2.5px;
  background: var(--gold-primary);
  border-radius: 3px;
  transition: var(--transition-normal);
  box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

/* 📱 MOBILE MENU */
@media (max-width: 900px) {
  .menu {
    position: fixed;
    top: 70px;
    right: clamp(16px, 4vw, 32px);
    flex-direction: column;
    background: var(--dark-card);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: 20px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-gold);
    box-shadow: var(--shadow-lg), var(--shadow-gold);
    gap: 4px;
    min-width: 200px;
    transform: scale(0.95) translateY(-10px);
    opacity: 0;
    visibility: hidden;
    transition: var(--transition-slow);
    z-index: 999;
  }

  .menu.show {
    transform: scale(1) translateY(0);
    opacity: 1;
    visibility: visible;
  }

  .menu a {
    width: 100%;
    text-align: center;
    padding: 14px;
    font-size: 1rem;
  }

  .hamburger {
    display: flex;
  }
}

/* 🎬 PREMIUM HERO SECTION */
.hero {
  text-align: center;
  padding: clamp(40px, 8vw, 80px) clamp(20px, 4vw, 40px);
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: clamp(300px, 60vw, 800px);
  height: clamp(300px, 60vw, 800px);
  background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);
  border-radius: 50%;
  animation: pulse 6s ease-in-out infinite;
  pointer-events: none;
  z-index: -1;
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
  50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
}

.hero h1 {
  margin-bottom: 24px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* 💎 PREMIUM PRICE BADGE */
.price {
  margin-top: 16px;
  padding: 14px 28px;
  background: var(--dark-card);
  border-radius: var(--radius-full);
  border: 1px solid var(--border-gold);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 1.1rem;
  box-shadow: var(--shadow-sm), var(--shadow-gold);
  transition: var(--transition-normal);
  backdrop-filter: blur(10px);
}

.price:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md), 0 0 30px rgba(212, 175, 55, 0.4);
  border-color: var(--gold-primary);
}

.price::before {
  content: '✨';
  font-size: 1.2rem;
  animation: sparkle 2s ease-in-out infinite;
}

@keyframes sparkle {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.9); }
}

/* 📦 PREMIUM CONTAINER & GRID */
.container {
  max-width: 1400px;
  margin: auto;
  padding: clamp(20px, 4vw, 40px);
}

.section-title {
  text-align: center;
  margin: clamp(40px, 6vw, 60px) 0 clamp(24px, 4vw, 40px);
  position: relative;
}

.section-title::after {
  content: '';
  display: block;
  width: 80px;
  height: 3px;
  background: var(--gold-gradient);
  margin: 16px auto 0;
  border-radius: 3px;
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
}

/* 🛍️ PREMIUM PRODUCT GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(140px, 25vw, 200px), 1fr));
  gap: clamp(16px, 3vw, 24px);
  padding: 8px;
}

/* 🎁 PREMIUM PRODUCT CARD */
.product {
  background: var(--dark-card);
  border-radius: var(--radius-md);
  padding: clamp(12px, 2vw, 20px);
  border: 1px solid var(--border-gold);
  text-align: center;
  transition: var(--transition-normal);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.product::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold-gradient);
  opacity: 0;
  transition: var(--transition-normal);
  z-index: -1;
}

.product:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: var(--gold-primary);
  box-shadow: var(--shadow-lg), var(--shadow-gold);
}

.product:hover::before {
  opacity: 0.08;
}

.product img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  transition: var(--transition-normal);
  border: 2px solid transparent;
  background: linear-gradient(var(--dark-card), var(--dark-card)) padding-box,
              var(--gold-gradient) border-box;
}

.product:hover img {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.product h4 {
  font-size: 1rem;
  margin: 8px 0 4px;
  color: var(--text-primary);
}

.product p {
  font-size: 0.9rem;
  color: var(--gold-light);
  font-weight: 600;
}

/* 🎬 PREMIUM VIDEO SECTION */
#videoList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: clamp(20px, 4vw, 32px);
  margin-top: 24px;
}

video, iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: var(--radius-md);
  border: 2px solid var(--border-gold);
  box-shadow: var(--shadow-md);
  transition: var(--transition-normal);
  background: #000;
}

video:hover, iframe:hover {
  border-color: var(--gold-primary);
  box-shadow: var(--shadow-lg), var(--shadow-gold);
  transform: translateY(-4px);
}

/* 🏪 PREMIUM TOKO CARDS */
.toko {
  background: var(--dark-card);
  padding: clamp(16px, 3vw, 24px);
  border-radius: var(--radius-md);
  margin: 12px 0;
  border: 1px solid var(--border-gold);
  transition: var(--transition-normal);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.toko:hover {
  transform: translateX(8px);
  border-color: var(--gold-primary);
  box-shadow: var(--shadow-gold);
}

.toko a {
  color: var(--gold-light);
  text-decoration: none;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition-fast);
}

.toko a:hover {
  color: var(--gold-primary);
  text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
}

/* 🌐 PREMIUM SOCIAL BUTTONS */
.social {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

.social a {
  background: var(--dark-card);
  padding: 12px 20px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border-gold);
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition-normal);
  backdrop-filter: blur(10px);
  min-width: 140px;
  justify-content: center;
}

.social a:hover {
  color: var(--dark-bg);
  background: var(--gold-gradient);
  transform: translateY(-4px) scale(1.05);
  box-shadow: var(--shadow-gold), 0 10px 30px rgba(0,0,0,0.3);
  border-color: transparent;
}

.social a i {
  font-size: 1.1rem;
}

/* 🎵 PREMIUM MUSIC BUTTON */
.music-btn {
  position: fixed;
  bottom: clamp(16px, 3vw, 24px);
  left: clamp(16px, 3vw, 24px);
  padding: 12px 24px;
  background: var(--gold-gradient);
  color: var(--dark-bg);
  border: none;
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  box-shadow: var(--gold-glow), var(--shadow-md);
  transition: var(--transition-normal);
  z-index: 999;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
}

.music-btn:hover {
  transform: scale(1.08) translateY(-3px);
  box-shadow: 0 0 30px rgba(212, 175, 55, 0.7), var(--shadow-lg);
}

.music-btn:active {
  transform: scale(0.98);
}

.music-btn.playing::before {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--dark-bg);
  border-radius: 50%;
  animation: pulseDot 1.5s ease-in-out infinite;
}

@keyframes pulseDot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.7; }
}

/* 🦶 PREMIUM FOOTER */
footer {
  text-align: center;
  padding: clamp(30px, 6vw, 50px) clamp(20px, 4vw, 40px);
  color: var(--text-muted);
  border-top: 1px solid var(--border-gold);
  margin-top: 40px;
  background: rgba(10, 10, 15, 0.8);
  backdrop-filter: blur(10px);
}

footer .gold {
  font-size: 1.1rem;
}

/* 🎨 PREMIUM SCROLLBAR */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: var(--dark-bg);
}

::-webkit-scrollbar-thumb {
  background: var(--gold-gradient);
  border-radius: var(--radius-full);
  border: 2px solid var(--dark-bg);
}

::-webkit-scrollbar-thumb:hover {
  background: var(--gold-primary);
}

/* 🎯 PREMIUM LOADING STATE */
.loading {
  position: relative;
  overflow: hidden;
}

.loading::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
  animation: loadingShine 1.5s infinite;
}

@keyframes loadingShine {
  to { left: 100%; }
}

/* 🎨 PREMIUM HOVER GLOW UTILITY */
.glow-hover {
  transition: var(--transition-normal);
}

.glow-hover:hover {
  box-shadow: var(--gold-glow), var(--shadow-lg);
}

/* 📱 RESPONSIVE ENHANCEMENTS */
@media (max-width: 600px) {
  .navbar {
    padding: 10px 16px;
  }
  
  .logo-circle {
    width: 42px;
    height: 42px;
  }
  
  .brand {
    font-size: 1.1rem;
  }
  
  .hero h1 {
    font-size: 1.8rem;
  }
  
  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  
  .product img {
    height: auto;
    aspect-ratio: 1;
  }
  
  .social a {
    min-width: 120px;
    padding: 10px 16px;
    font-size: 0.85rem;
  }
  
  .music-btn {
    padding: 10px 18px;
    font-size: 0.8rem;
    bottom: 12px;
    left: 12px;
  }
}

/* 🖥️ DESKTOP ENHANCEMENTS */
@media (min-width: 1200px) {
  .grid {
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 28px;
  }
  
  .product {
    padding: 24px;
  }
  
  .product img {
    height: 180px;
  }
}

/* 🎨 DARK MODE OPTIMIZATION */
@media (prefers-color-scheme: dark) {
  :root {
    --dark-bg: #0a0a0f;
    --dark-card: rgba(20, 20, 30, 0.85);
  }
}

/* ♿ ACCESSIBILITY */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* 🎯 FOCUS STATES FOR ACCESSIBILITY */
a:focus-visible,
button:focus-visible,
.menu a:focus-visible {
  outline: 2px solid var(--gold-primary);
  outline-offset: 4px;
  border-radius: var(--radius-sm);
}

/* 🎨 PRINT STYLES */
@media print {
  .stars, .wave, .music-btn, .hamburger {
    display: none !important;

<script>
const firebaseConfig = {
        apiKey: "AIzaSyCi-CNKPGkeUuc7WBCizkQlLO9DT2cXJAk",
        authDomain: "tokomasmerysa.firebaseapp.com",
        databaseURL: "https://tokomasmerysa-default-rtdb.asia-southeast1.firebasedatabase.app",

if (typeof firebase === 'undefined') {

const db = firebase.database();

/* 🎯 DOM ELEMENTS - CACHED REFERENCES */
const elements = {
  menu: document.getElementById('menu'),
  hamburger: document.querySelector('.hamburger'),
  logo: document.getElementById('logo'),
  price: document.getElementById('price'),
  produkList: document.getElementById('produkList'),
  videoList: document.getElementById('videoList'),
  music: document.getElementById('bgMusic'),
  musicBtn: document.getElementById('musicBtn')
};

/* 🛡️ UTILITY: Sanitize HTML untuk mencegah XSS */
const sanitize = (str) => {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
};

/* 🛡️ UTILITY: Safe image URL validator */
const isValidUrl = (url) => {
  try {
    const parsed = new URL(url);
    return parsed.protocol === 'http:' || parsed.protocol === 'https:';
  } catch {
    return false;
  }
};

/* 🍔 MOBILE MENU TOGGLE */
function toggleMenu() {
  if (!elements.menu || !elements.hamburger) return;
  
  elements.menu.classList.toggle('show');
  elements.hamburger.classList.toggle('active');
  
  // Close menu when clicking outside (mobile)
  const closeOnOutsideClick = (e) => {
    if (!elements.menu.contains(e.target) && !elements.hamburger.contains(e.target)) {
      elements.menu.classList.remove('show');
      elements.hamburger.classList.remove('active');
      document.removeEventListener('click', closeOnOutsideClick);
    }
  };
  
  if (elements.menu.classList.contains('show')) {
    setTimeout(() => {
      document.addEventListener('click', closeOnOutsideClick);
    }, 100);
  }
}

// Attach hamburger click event
if (elements.hamburger) {
  elements.hamburger.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMenu();
  });
}

/* ⚙️ CONFIG LISTENER - REALTIME UPDATES */
if (db) {
  db.ref('config').on('value', 
    (snap) => {
      const c = snap.val() || {};
      
      // Update logo dengan validasi
      if (c.logo && isValidUrl(c.logo) && elements.logo) {
        elements.logo.src = c.logo;
        elements.logo.alt = 'Merysa Gold Logo';
        elements.logo.style.opacity = '1';
      }
      
      // Update background dengan fallback
      if (c.bg && isValidUrl(c.bg)) {
        document.body.style.background = `url(${c.bg}) center/cover fixed`;
        document.body.style.backgroundAttachment = 'fixed';
      }
      
      // Update harga dengan formatting
      if (c.price && elements.price) {
        elements.price.innerHTML = `<span class="gold">💰</span> ${sanitize(c.price)}`;
        elements.price.classList.remove('loading');
      }
    },
    (error) => {
      console.error('❌ Error fetching config:', error);
      if (elements.price) {
        elements.price.textContent = 'Harga tidak tersedia';
        elements.price.classList.add('error');
      }
    }
  );

  /* 🛍️ PRODUK LISTENER - EFFICIENT RENDERING */
  db.ref('produk').on('value',
    (snap) => {
      if (!elements.produkList) return;
      
      // Clear dengan aman
      elements.produkList.innerHTML = '';
      
      const fragment = document.createDocumentFragment();
      let count = 0;
      
      snap.forEach((child) => {
        const d = child.val();
        if (!d) return;
        
        const productCard = document.createElement('div');
        productCard.className = 'product glow-hover';
        productCard.innerHTML = `
          <img 
            src="${d.img && isValidUrl(d.img) ? d.img : 'images/placeholder-gold.png'}" 
            alt="${sanitize(d.nama || 'Produk Emas')}"
            loading="lazy"
            onerror="this.src='images/placeholder-gold.png'; this.alt='Gambar tidak tersedia';"
          >
          <h4>${sanitize(d.nama || 'Produk Premium')}</h4>
          <p class="gold">${sanitize(d.harga || 'Hubungi Kami')}</p>
        `;
        
        fragment.appendChild(productCard);
        count++;
      });
      
      elements.produkList.appendChild(fragment);
      
      // Empty state
      if (count === 0) {
        elements.produkList.innerHTML = `
          <div class="product" style="grid-column: 1/-1;">
            <p style="color: var(--text-muted);">✨ Produk akan segera hadir ✨</p>
          </div>
        `;
      }
    },
    (error) => {
      console.error('❌ Error fetching produk:', error);
      if (elements.produkList) {
        elements.produkList.innerHTML = `
          <div class="product" style="grid-column: 1/-1; border-color: #ff6b6b;">
            <p style="color: #ff6b6b;">⚠️ Gagal memuat produk. Silakan refresh.</p>
          </div>
        `;
      }
    }
  );

  /* 🎬 VIDEO LISTENER - SECURE EMBED */
  db.ref('video').on('value',
    (snap) => {
      if (!elements.videoList) return;
      
      elements.videoList.innerHTML = '';
      const fragment = document.createDocumentFragment();
      
      snap.forEach((child) => {
        const d = child.val();
        if (!d) return;
        
        const videoWrapper = document.createElement('div');
        videoWrapper.style.position = 'relative';
        videoWrapper.style.paddingBottom = '56.25%'; // 16:9 aspect ratio
        videoWrapper.style.borderRadius = 'var(--radius-md)';
        videoWrapper.style.overflow = 'hidden';
        videoWrapper.style.border = '1px solid var(--border-gold)';
        videoWrapper.style.boxShadow = 'var(--shadow-md)';
        
        let mediaElement;
        
        if (d.file && isValidUrl(d.file)) {
          // Local/CDN video file
          mediaElement = document.createElement('video');
          mediaElement.src = d.file;
          mediaElement.controls = true;
          mediaElement.preload = 'metadata';
          mediaElement.style.position = 'absolute';
          mediaElement.style.top = '0';
          mediaElement.style.left = '0';
          mediaElement.style.width = '100%';
          mediaElement.style.height = '100%';
          mediaElement.style.objectFit = 'cover';
          mediaElement.setAttribute('playsinline', '');
          mediaElement.setAttribute('webkit-playsinline', '');
          
        } else if (d.url && isValidUrl(d.url)) {
          // YouTube/Vimeo embed dengan security enhancements
          const embedUrl = d.url
            .replace('watch?v=', 'embed/')
            .replace('youtu.be/', 'youtube.com/embed/')
            .replace('?feature=share', '')
            .split('?')[0] + '?rel=0&modestbranding=1&controls=1';
          
          mediaElement = document.createElement('iframe');
          mediaElement.src = embedUrl;
          mediaElement.title = sanitize(d.judul || 'Video Merysa Gold');
          mediaElement.loading = 'lazy';
          mediaElement.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          mediaElement.allowFullscreen = true;
          mediaElement.style.position = 'absolute';
          mediaElement.style.top = '0';
          mediaElement.style.left = '0';
          mediaElement.style.width = '100%';
          mediaElement.style.height = '100%';
          mediaElement.style.border = 'none';
          mediaElement.referrerPolicy = 'strict-origin-when-cross-origin';
        }
        
        if (mediaElement) {
          videoWrapper.appendChild(mediaElement);
          fragment.appendChild(videoWrapper);
        }
      });
      
      elements.videoList.appendChild(fragment);
      
      // Empty state
      if (!elements.videoList.children.length) {
        elements.videoList.innerHTML = `
          <div style="text-align:center; padding:40px; color:var(--text-muted);">
            <p>🎬 Video showcase akan segera hadir</p>
          </div>
        `;
      }
    },
    (error) => {
      console.error('❌ Error fetching video:', error);
    }
  );
}

/* 🎵 MUSIC PLAYER - ROBUST IMPLEMENTATION */
class MusicPlayer {
  constructor(audioEl, btnEl) {
    this.audio = audioEl;
    this.btn = btnEl;
    this.isPlaying = false;
    this.hasInteracted = false;
    
    this.init();
  }
  
  init() {
    if (!this.audio || !this.btn) return;
    
    // Preload audio metadata
    this.audio.preload = 'metadata';
    this.audio.volume = 0.6; // Default volume 60%
    
    // Button click handler
    this.btn.addEventListener('click', (e) => {
      e.stopPropagation();
      this.toggle();
    });
    
    // Handle audio events
    this.audio.addEventListener('play', () => {
      this.isPlaying = true;
      this.updateButtonState();
      this.savePreference(true);
    });
    
    this.audio.addEventListener('pause', () => {
      this.isPlaying = false;
      this.updateButtonState();
      this.savePreference(false);
    });
    
    this.audio.addEventListener('error', (e) => {
      console.error('❌ Audio error:', e);
      this.btn.disabled = true;
      this.btn.innerHTML = '⚠️ Audio Error';
      this.btn.style.opacity = '0.6';
    });
    
    // Enable after first user interaction (browser policy)
    const enableOnInteraction = () => {
      this.hasInteracted = true;
      this.loadSavedPreference();
      document.body.removeEventListener('click', enableOnInteraction);
      document.body.removeEventListener('touchstart', enableOnInteraction);
    };
    
    document.body.addEventListener('click', enableOnInteraction, { once: true });
    document.body.addEventListener('touchstart', enableOnInteraction, { once: true });
  }
  
  async toggle() {
    if (!this.audio) return;
    
    try {
      if (this.isPlaying) {
        await this.audio.pause();
      } else {
        // Browser might block autoplay, handle gracefully
        await this.audio.play();
      }
    } catch (err) {
      console.warn('⚠️ Playback blocked by browser:', err);
      // Show user hint
      this.btn.innerHTML = '🔕 Klik untuk aktifkan audio';
      setTimeout(() => this.updateButtonState(), 3000);
    }
  }
  
  updateButtonState() {
    if (!this.btn) return;
    
    if (this.isPlaying) {
      this.btn.innerHTML = '<span style="animation:pulseDot 1.5s infinite">⏺️</span> Pause Musik';
      this.btn.classList.add('playing');
    } else {
      this.btn.innerHTML = '▶️ Play Musik';
      this.btn.classList.remove('playing');
    }
  }
  
  savePreference(play) {
    try {
      localStorage.setItem('merysa_music', play ? '1' : '0');
    } catch (e) {
      console.warn('Could not save music preference');
    }
  }
  
  loadSavedPreference() {
    const pref = localStorage.getItem('merysa_music');
    if (pref === '1' && !this.isPlaying) {
      // Attempt to play after user interaction
      this.audio.play().catch(() => {
        // Silently fail if blocked
      });
    }
  }
}

// Initialize music player after DOM ready
if (elements.music && elements.musicBtn) {
  // Wait for DOM to be fully ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      new MusicPlayer(elements.music, elements.musicBtn);
    });
  } else {
    new MusicPlayer(elements.music, elements.musicBtn);
  }
}

/* 🧹 CLEANUP - Prevent memory leaks on page unload */
window.addEventListener('beforeunload', () => {
  if (db) {
    db.ref('config').off();
    db.ref('produk').off();
    db.ref('video').off();
  }
  
  if (elements.music) {
    elements.music.pause();
  }
});

/* 🎯 SMOOTH SCROLL FOR ANCHOR LINKS */
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    const targetId = this.getAttribute('href');
    
    if (targetId === '#') return;
    
    const target = document.querySelector(targetId);
    if (target) {
      // Close mobile menu if open
      elements.menu?.classList.remove('show');
      elements.hamburger?.classList.remove('active');
      
      // Smooth scroll with offset for fixed header
      const headerOffset = 80;
      const elementPosition = target.getBoundingClientRect().top;
      const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
      
      window.scrollTo({
        top: offsetPosition,
        behavior: 'smooth'
      });
    }
  });
});

/* 🎨 NAVBAR SCROLL EFFECT */
const navbar = document.querySelector('.navbar');
if (navbar) {
  const handleScroll = () => {
    if (window.scrollY > 50) {
      navbar.classList.add('scrolled');
    } else {
      navbar.classList.remove('scrolled');
    }
  };
  
  // Throttle scroll event for performance
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      window.requestAnimationFrame(() => {
        handleScroll();
        ticking = false;
      });
      ticking = true;
    }
  });
  
  // Initial check
  handleScroll();
}

/* 📱 TOUCH OPTIMIZATION */
// Prevent double-tap zoom on mobile (optional)
document.addEventListener('touchstart', function(e) {
  if (e.touches.length > 1) {
    e.preventDefault();
  }
}, { passive: false });

// Handle viewport resize for mobile menu
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    // Close mobile menu if screen resized to desktop
    if (window.innerWidth > 900 && elements.menu) {
      elements.menu.classList.remove('show');
      elements.hamburger?.classList.remove('active');
    }
  }, 250);
});

// =====================================
// REGISTER SERVICE WORKER
// ==========================================
if ('servic-eWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('/sw.js', {
        scope: '/'
      });
      console.log('[PWA] Service Worker registered:', registration.scope);

      // Auto update setiap 1 jam
      setInterval(() => {
        registration.update();
      }, 60 * 60 * 1000);

      // Detect update
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateNotification();
          }
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('[PWA] New service worker activated');
        window.location.reload();
      });

    } catch (error) {
      console.error('[PWA] Service Worker registration failed:', error);
    }
  });
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  setTimeout(() => {

// ==========================================
// TOMBOL INSTALL
// ==========================================
function showInstallButton() {
  const existingBtn = document.getElementById('installBtn');
  if (existingBtn) return;

  const installBtn = document.createElement('button');
  installBtn.id = 'installBtn';
  installBtn.innerHTML = '📲 Install App';

  installBtn.style.cssText = `
    position: fixed; bottom: 80px; left: 20px; z-index: 1500;
    background: linear-gradient(135deg, #D4AF37, #AA8C2C);
    color: #0A0A0A; border: none; padding: 12px 20px; border-radius: 25px;
    font-weight: 600; font-size: 0.85rem; cursor: pointer;
    box-shadow: 0 5px 20px rgba(212,175,55,0.4);
    display: flex; align-items: center; gap: 8px;
    font-family: 'Poppins', sans-serif;
  `;

  installBtn.onclick = () => {
    showInstallOptions();
  };

  document.body.appendChild(installBtn);

  // Auto hide
  setTimeout(() => {
    installBtn.style.opacity = '0';
    installBtn.style.transform = 'translateY(100px)';
    installBtn.style.transition = 'all 0.5s ease';
    setTimeout(() => installBtn.remove(), 500);
  }, 30000);
}

// ==========================================
// MODAL PILIHAN INSTALL
// ==========================================
function showInstallOptions() {
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
  `;

  modal.innerHTML = `
    <div style="
      background:#111;
      padding:20px;
      border-radius:15px;
      text-align:center;
      width:90%;
      max-width:300px;
      font-family:'Poppins',sans-serif;
      color:#fff;
    ">
      <h3 style="margin-bottom:15px;">Pilih Instalasi</h3>

      <button id="pwaInstall" style="
        width:100%; margin-bottom:10px;
        padding:12px; border:none;
        border-radius:10px;
        background:#D4AF37; color:#000;
        font-weight:bold;
        cursor:pointer;
      ">
        📲 Install Langsung
      </button>

      <button id="playstoreInstall" style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#0f9d58;
        color:#fff;
        font-weight:bold;
        cursor:pointer;
      ">
        ▶️ Play Store
      </button>

      <button id="closeModal" style="
        margin-top:10px;
        background:none;
        border:none;
        color:#aaa;
        cursor:pointer;
      ">Tutup</button>
    </div>
  `;

  document.body.appendChild(modal);

  // INSTALL PWA
  document.getElementById('pwaInstall').onclick = async () => {
    if (!deferredPrompt) {
      showToast('Browser tidak mendukung install langsung');
      return;
    }

    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;

    if (outcome === 'accepted') {
      console.log('[PWA] User accepted install');
      showToast('Aplikasi berhasil di-install! 🎉');
    }

    deferredPrompt = null;
    modal.remove();
  };

  // PLAY STORE (GANTI LINK INI)
  document.getElementById('playstoreInstall').onclick = () => {
    window.open('https://play.google.com/store/apps/details?id=github.qtok.twa', '_blank');
  };

  // CLOSE
  document.getElementById('closeModal').onclick = () => {
    modal.remove();
  };
}

// ==========================================

  }
}
