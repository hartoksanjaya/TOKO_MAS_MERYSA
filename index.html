<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Mas Merysa | Exclusive Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        :root {
            --gold-primary: #D4AF37;
            --dark-bg: #1a1a1a;
            --text-light: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
            /* Background default jika firebase kosong */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('images/bg.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            transition: background 0.5s ease;
        }

        nav {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo img {
            height: 70px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
            transition: 0.3s;
        }

        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: 4rem;
            letter-spacing: 5px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gold-price-ticker {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border: 1px solid var(--gold-primary);
            border-radius: 50px;
            margin-top: 20px;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .gallery {
            padding: 5rem 10%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px;
            text-align: center;
            transition: 0.5s;
            backdrop-filter: blur(5px);
        }

        .product-card:hover {
            border-color: var(--gold-primary);
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
        }

        .product-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        .product-card h3 {
            color: var(--gold-primary);
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Music Player Premium Styles */
.music-player {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 1000;
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 20px;
    border-radius: 50px;
    border: 1px solid var(--gold-primary);
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: 0.3s;
}

.music-player:hover {
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
}

/* Animasi Bar Musik */
.visualizer {
    display: flex;
    align-items: flex-end;
    height: 20px;
    gap: 3px;
    margin-right: 15px;
}

.bar {
    width: 3px;
    background: var(--gold-primary);
    height: 5px;
    transition: 0.2s;
}

/* Class saat musik menyala */
.playing .bar {
    animation: bounce 1s ease-in-out infinite;
}

.playing .bar:nth-child(2) { animation-delay: 0.2s; }
.playing .bar:nth-child(3) { animation-delay: 0.4s; }
.playing .bar:nth-child(4) { animation-delay: 0.6s; }

@keyframes bounce {
    0%, 100% { height: 5px; }
    50% { height: 20px; }
}

.music-text {
    font-size: 12px;
    color: var(--gold-primary);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: bold;
}


        footer {
            text-align: center;
            padding: 4rem;
            border-top: 1px solid var(--glass);
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="images/logo.png" id="mainLogo" alt="Merysa Logo">
        </div>
        <div class="menu">
            <i class="fas fa-bars" style="font-size: 1.5rem; color: var(--gold-primary);"></i>
        </div>
    </nav>

    <section class="hero">
        <h1>Toko Mas Merysa</h1>
        <p style="font-style: italic; letter-spacing: 3px;">Kemurnian Abadi, Keindahan Hakiki</p>
        
        <div class="gold-price-ticker">
            <i class="fas fa-chart-line"></i> Harga Emas Hari Ini: 
            <span id="displayHarga" style="color: var(--gold-primary); font-weight: bold;">Memuat...</span>
        </div>
    </section>

    <section class="gallery" id="mainGallery"></section>

    <div class="music-player" id="playerBtn" onclick="toggleMusic()">
    <div class="visualizer" id="visualizer">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    <span class="music-text" id="statusText">Play Music</span>
    
    <audio id="bgMusic" loop>
        <source src="audio/musik_latar.mp3" type="audio/mpeg">
    </audio>
</div>
    <footer>
        &copy; 2026 TOKO MAS MERYSA. PEKANBARU, INDONESIA.
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // MASUKKAN CONFIG FIREBASE ANDA DI SINI
        const firebaseConfig = {
        apiKey: "AIzaSyCi-CNKPGkeUuc7WBCizkQlLO9DT2cXJAk",
        authDomain: "tokomasmerysa.firebaseapp.com",
        databaseURL: "https://tokomasmerysa-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tokomasmerysa",
        appId: "1:659517947527:web:4ed83fc9f6206b45ef0222"
    };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Ambil Config (Harga, Logo, Background)
        db.ref('toko_mas/config').on('value', (snapshot) => {
            const config = snapshot.val();
            if(config) {
                if(config.harga) document.getElementById('displayHarga').innerText = config.harga;
                if(config.logo) document.getElementById('mainLogo').src = config.logo;
                if(config.bg) {
                    document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url(${config.bg})`;
                }
            }
        });

        // 2. Ambil Daftar Produk (Banyak Produk)
        db.ref('toko_mas/produk').on('value', (snapshot) => {
            const gallery = document.getElementById('mainGallery');
            gallery.innerHTML = ""; // Kosongkan gallery
            
            snapshot.forEach((child) => {
                const item = child.val();
                gallery.innerHTML += `
                    <div class="product-card">
                        <img src="${item.foto}" alt="${item.nama}">
                        <h3>${item.nama}</h3>
                        <p>Koleksi Eksklusif</p>
                    </div>
                `;
            });
        });

const music = document.getElementById("bgMusic");
const playerBtn = document.getElementById("playerBtn");
const statusText = document.getElementById("statusText");

function toggleMusic() {
    if (music.paused) {
        music.play();
        playerBtn.classList.add("playing");
        statusText.innerText = "Now Playing";
    } else {
        music.pause();
        playerBtn.classList.remove("playing");
        statusText.innerText = "Music Paused";
    }
}

// Tambahan agar jika musik berhenti sendiri, visualizer mati
music.onpause = function() {
    playerBtn.classList.remove("playing");
};

    </script>
</body>
</html>
