<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merysa Gold Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- 📱 PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
--gold:#D4AF37;
--dark:#050505;
--border:rgba(212,175,55,0.3);
}

body{
margin:0;
font-family:Poppins;
background:var(--dark);
color:#fff;
overflow-x:hidden;
}

/* ✨ GOLD SHINE */
.gold{
background:linear-gradient(120deg,#BF953F,#FCF6BA,#B38728,#FBF5B7);
background-size:300%;
-webkit-background-clip:text;
color:transparent;
animation:shine 6s linear infinite;
}
@keyframes shine{0%{background-position:0}100%{background-position:300%}}

/* 🌌 BINTANG */
.stars{
position:fixed;
width:100%;height:100%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
animation:moveStars 50s linear infinite;
opacity:0.3;
z-index:-1;
}
@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* 🌊 AIR EFFECT */
.wave{
position:fixed;
bottom:0;
width:100%;
height:120px;
background:rgba(212,175,55,0.1);
animation:wave 6s infinite linear;
z-index:-1;
}
@keyframes wave{
0%{transform:translateX(0);}
100%{transform:translateX(-200px);}
}

/* NAVBAR */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:999;
}

.logo{height:40px;}

.menu{
display:flex;
gap:15px;
}

.menu a{
color:#fff;
text-decoration:none;
font-size:0.9rem;
}

/* HAMBURGER */
.hamburger{
display:none;
cursor:pointer;
font-size:20px;
}
/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(212,175,55,0.3);
position:sticky;
top:0;
z-index:999;
}

/* LEFT SIDE */
.nav-left{
display:flex;
align-items:center;
gap:12px;
}

/* LOGO BULAT */
.logo-circle{
width:45px;
height:45px;
border-radius:50%;
object-fit:cover;
border:2px solid #D4AF37;
box-shadow:0 0 10px rgba(212,175,55,0.5);
transition:0.3s;
}

.logo-circle:hover{
transform:scale(1.1);
box-shadow:0 0 20px rgba(212,175,55,0.8);
}

/* BRAND TEXT */
.brand{
font-size:1.2rem;
letter-spacing:1px;
}

/* MENU */
.menu{
display:flex;
gap:20px;
}

.menu a{
color:#fff;
text-decoration:none;
font-size:0.9rem;
position:relative;
transition:0.3s;
}

/* UNDERLINE EFFECT */
.menu a::after{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:0%;
height:2px;
background:#D4AF37;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

/* HAMBURGER */
.hamburger{
display:none;
font-size:22px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.menu{
display:none;
flex-direction:column;
position:absolute;
top:65px;
right:10px;
background:#111;
padding:15px;
border-radius:10px;
border:1px solid rgba(212,175,55,0.3);
}

.menu.show{
display:flex;
}

.hamburger{
display:block;
}
}

@media(max-width:768px){
.menu{
display:none;
flex-direction:column;
position:absolute;
top:60px;
right:10px;
background:#111;
padding:15px;
border-radius:10px;
}
.menu.show{display:flex;}
.hamburger{display:block;}
}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
}

.price{
margin-top:10px;
padding:10px 20px;
background:#111;
border-radius:10px;
border:1px solid var(--border);
display:inline-block;
}

/* GRID */
.container{max-width:1200px;margin:auto;padding:20px;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

/* PRODUCT */
.product{
background:#111;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
text-align:center;
transition:0.3s;
}
.product:hover{
transform:translateY(-5px);
box-shadow:0 5px 20px rgba(212,175,55,0.3);
}
.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

/* VIDEO */
video,iframe{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* TOKO */
.toko{
background:#111;
padding:10px;
border-radius:10px;
margin-top:10px;
border:1px solid var(--border);
}

/* SOSIAL */
.social{
display:flex;
flex-wrap:wrap;
gap:10px;
}
.social a{
background:#111;
padding:8px 12px;
border-radius:8px;
border:1px solid var(--border);
color:#fff;
text-decoration:none;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:#aaa;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="wave"></div>

<!-- 🎵 MUSIK -->
<audio autoplay loop>
<source src="assets/music/bg.mp3" type="audio/mpeg">
</audio>

<header class="navbar">

<div class="nav-left">
<img id="logo" class="logo-circle">
<h3 class="gold brand">Merysa Gold</h3>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<a href="#">Home</a>
<a href="#produk">Produk</a>
<a href="#video">Video</a>
<a href="#toko">Toko</a>
</div>

</header>

<div class="hero">
<h1 class="gold">Toko Emas Merysa Premium</h1>
<div id="price" class="price">Memuat...</div>
</div>

<div class="container">

<h2 id="produk" class="gold">🛍️ Produk</h2>
<div id="produkList" class="grid"></div>

<h2 id="video" class="gold">🎬 Video</h2>
<div id="videoList"></div>

<h2 id="toko" class="gold">📍 Kunjungi Toko Kami</h2>
<div class="toko">Toko Mas Merysa</div>
<div class="toko">Toko Mas New Merysa</div>
<div class="toko">Toko Mas Merysa Baru</div>
<div class="toko">
<a href="https://maps.app.goo.gl/x7c3bfhwkh14HWFr8" target="_blank">📍 Lihat Lokasi</a>
</div>
<div class="toko">Toko Mas Grand Merysa (Coming Soon)</div>

<h2 class="gold">🌐 Media Sosial</h2>

<div class="social">

<a href="#" target="_blank" class="soc yt">
<i class="fab fa-youtube"></i> YouTube
</a>

<a href="#" target="_blank" class="soc fb">
<i class="fab fa-facebook-f"></i> Facebook
</a>

<a href="https://www.tiktok.com/@tokomasmerysa?_r=1&_t=ZS-962zr6I44Sm" target="_blank" class="soc tt">
<i class="fab fa-tiktok"></i> TikTok
</a>

<a href="#" target="_blank" class="soc ig">
<i class="fab fa-instagram"></i> Instagram
</a>

</div>

</div>

<footer>© 2026 Merysa Gold</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
        apiKey: "AIzaSyCi-CNKPGkeUuc7WBCizkQlLO9DT2cXJAk",
        authDomain: "tokomasmerysa.firebaseapp.com",
        databaseURL: "https://tokomasmerysa-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tokomasmerysa",
        appId: "1:659517947527:web:4ed83fc9f6206b45ef0222"
        };
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* MENU */
function toggleMenu(){
menu.classList.toggle("show");
}

/* CONFIG */
db.ref("config").on("value",snap=>{
let c=snap.val()||{};
if(c.logo) logo.src=c.logo;
if(c.bg) document.body.style.background=`url(${c.bg}) center/cover fixed`;
if(c.price) price.innerText=c.price;
});

/* PRODUK */
db.ref("produk").on("value",snap=>{
produkList.innerHTML="";
snap.forEach(c=>{
let d=c.val();
produkList.innerHTML+=`
<div class="product">
<img src="${d.img||''}">
<h4>${d.nama}</h4>
<p>${d.harga}</p>
</div>`;
});
});

/* VIDEO */
db.ref("video").on("value",snap=>{
videoList.innerHTML="";
snap.forEach(c=>{
let d=c.val();
let media=d.file
? `<video src="${d.file}" controls></video>`
: `<iframe src="${d.url}"></iframe>`;
videoList.innerHTML+=media;
});
});
// =====================================
// REGISTER SERVICE WORKER
// ==========================================
if ('servic-eWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('/sw.js', {
        scope: '/'
      });
      console.log('[PWA] Service Worker registered:', registration.scope);

      // Auto update setiap 1 jam
      setInterval(() => {
        registration.update();
      }, 60 * 60 * 1000);

      // Detect update
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateNotification();
          }
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('[PWA] New service worker activated');
        window.location.reload();
      });

    } catch (error) {
      console.error('[PWA] Service Worker registration failed:', error);
    }
  });
}

// ==========================================
// CAPTURE INSTALL PROMPT
// ==========================================
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  console.log('[PWA] Install prompt captured');

  setTimeout(() => {
    showInstallButton();
  }, 3000);
});

// ==========================================
// TOMBOL INSTALL
// ==========================================
function showInstallButton() {
  const existingBtn = document.getElementById('installBtn');
  if (existingBtn) return;

  const installBtn = document.createElement('button');
  installBtn.id = 'installBtn';
  installBtn.innerHTML = '📲 Install App';

  installBtn.style.cssText = `
    position: fixed; bottom: 80px; left: 20px; z-index: 1500;
    background: linear-gradient(135deg, #D4AF37, #AA8C2C);
    color: #0A0A0A; border: none; padding: 12px 20px; border-radius: 25px;
    font-weight: 600; font-size: 0.85rem; cursor: pointer;
    box-shadow: 0 5px 20px rgba(212,175,55,0.4);
    display: flex; align-items: center; gap: 8px;
    font-family: 'Poppins', sans-serif;
  `;

  installBtn.onclick = () => {
    showInstallOptions();
  };

  document.body.appendChild(installBtn);

  // Auto hide
  setTimeout(() => {
    installBtn.style.opacity = '0';
    installBtn.style.transform = 'translateY(100px)';
    installBtn.style.transition = 'all 0.5s ease';
    setTimeout(() => installBtn.remove(), 500);
  }, 30000);
}

// ==========================================
// MODAL PILIHAN INSTALL
// ==========================================
function showInstallOptions() {
  const modal = document.createElement('div');
  modal.style.cssText = `
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
  `;

  modal.innerHTML = `
    <div style="
      background:#111;
      padding:20px;
      border-radius:15px;
      text-align:center;
      width:90%;
      max-width:300px;
      font-family:'Poppins',sans-serif;
      color:#fff;
    ">
      <h3 style="margin-bottom:15px;">Pilih Instalasi</h3>

      <button id="pwaInstall" style="
        width:100%; margin-bottom:10px;
        padding:12px; border:none;
        border-radius:10px;
        background:#D4AF37; color:#000;
        font-weight:bold;
        cursor:pointer;
      ">
        📲 Install Langsung
      </button>

      <button id="playstoreInstall" style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#0f9d58;
        color:#fff;
        font-weight:bold;
        cursor:pointer;
      ">
        ▶️ Play Store
      </button>

      <button id="closeModal" style="
        margin-top:10px;
        background:none;
        border:none;
        color:#aaa;
        cursor:pointer;
      ">Tutup</button>
    </div>
  `;

  document.body.appendChild(modal);

  // INSTALL PWA
  document.getElementById('pwaInstall').onclick = async () => {
    if (!deferredPrompt) {
      showToast('Browser tidak mendukung install langsung');
      return;
    }

    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;

    if (outcome === 'accepted') {
      console.log('[PWA] User accepted install');
      showToast('Aplikasi berhasil di-install! 🎉');
    }

    deferredPrompt = null;
    modal.remove();
  };

  // PLAY STORE (GANTI LINK INI)
  document.getElementById('playstoreInstall').onclick = () => {
    window.open('https://play.google.com/store/apps/details?id=github.qtok.twa', '_blank');
  };

  // CLOSE
  document.getElementById('closeModal').onclick = () => {
    modal.remove();
  };
}

// ==========================================
// STATUS INSTALLED
// ==========================================
window.addEventListener('appinstalled', () => {
  isPWAInstalled = true;
  console.log('[PWA] App installed');
  showToast('Terima kasih telah meng-install MERYSA! 💛');

  const installBtn = document.getElementById('installBtn');
  if (installBtn) installBtn.remove();
});

// ==========================================
// UPDATE NOTIFICATION
// ==========================================
function showUpdateNotification() {
  if (confirm('Versi baru tersedia! Refresh untuk update?')) {
    navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
  }
}

// ==========================================
// ONLINE / OFFLINE STATUS
// ==========================================
window.addEventListener('online', () => {
  showToast('Koneksi internet kembali! 🌐');
});

window.addEventListener('offline', () => {
  showToast('Mode offline - Data tersimpan di perangkat 📴');
});

// ==========================================
// PRECACHE
// ==========================================
if ('serviceWorker' in navigator && navigator.onLine) {
  navigator.serviceWorker.ready.then((registration) => {
    registration.active.postMessage({
      type: 'CACHE_URLS',
      urls: [
        '/#products',
        '/#hero'
      ]
    });
  });
}

console.log('[PWA] Toko Mas Merysa PWA Ready');
</script>

</body>
</html>
